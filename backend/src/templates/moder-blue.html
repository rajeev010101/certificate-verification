<div class="certificate">
  <img src="{{logo}}" class="logo" />

  <h1>Certificate of Achievement</h1>

  <p>This is to certify that</p>
  <h2>{{name}}</h2>

  <p>has completed</p>
  <h3>{{course}}</h3>

  <p>{{description}}</p>

  <img src="{{qr}}" width="100" />

  <p>ID: {{certificateId}}</p>
</div>
